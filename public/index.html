<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 PDFORGE ULTRA PRO</title>

<style>
body {
  background:#0b1220;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1 {
  margin-top:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

button {
  padding:15px;
  border:none;
  border-radius:15px;
  background:linear-gradient(45deg,#6a5cff,#8f44fd);
  color:white;
  font-size:16px;
  cursor:pointer;
}

input {
  margin-top:20px;
}
</style>
</head>

<body>

<h1>🔥 PDFORGE ULTRA PRO</h1>

<input type="file" id="files" multiple>

<div class="grid">

<button onclick="run('merge')">دمج PDF</button>
<button onclick="run('split')">تقسيم PDF</button>

<button onclick="run('compress')">ضغط PDF</button>
<button onclick="run('repair')">إصلاح PDF</button>

<button onclick="run('pdfoffice')">PDF → Word</button>
<button onclick="run('officepdf')">Word → PDF</button>

<button onclick="run('pdfpowerpoint')">PDF → PPT</button>
<button onclick="run('powerpointpdf')">PPT → PDF</button>

<button onclick="run('pdfexcel')">PDF → Excel</button>
<button onclick="run('exceltopdf')">Excel → PDF</button>

<button onclick="run('pdfjpg')">PDF → JPG</button>
<button onclick="run('jpgpdf')">JPG → PDF</button>

<button onclick="run('rotate')">تدوير PDF</button>
<button onclick="run('watermark')">علامة مائية</button>

<button onclick="run('protect')">حماية PDF</button>
<button onclick="run('unlock')">فك حماية PDF</button>

<button onclick="run('ocr')">OCR</button>
<button onclick="run('htmlpdf')">HTML → PDF</button>

<button onclick="run('extract')">استخراج صفحات</button>
<button onclick="run('organize')">ترتيب PDF</button>

</div>

<script>
async function run(tool){
  const input = document.getElementById("files");

  if(!input.files.length){
    alert("❌ اختار ملف الأول");
    return;
  }

  const formData = new FormData();

  for(let i=0;i<input.files.length;i++){
    formData.append("file",input.files[i]);
  }

  formData.append("tool",tool);

  try{
    const res = await fetch("/api/process",{
      method:"POST",
      body:formData
    });

    // 🔥 أهم تعديل: عرض الخطأ الحقيقي
    if (!res.ok) {
      const text = await res.text();
      alert("❌ ERROR:\n" + text);
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "PDFORGE_RESULT";
    a.click();

  }catch(err){
    alert("❌ Network Error أو السيرفر واقع");
  }
}
</script>

</body>
</html>
