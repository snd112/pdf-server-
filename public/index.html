<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDFORGE ULTRA</title>

<style>
body {
  font-family: Arial;
  background: #0b1b2b;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: #10263a;
  padding: 20px;
  border-radius: 12px;
}

select, input {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
}
</style>

</head>
<body>

<h1>🔥 PDFORGE ULTRA</h1>

<div class="container">

<select id="tool">
  <option value="merge">دمج PDF</option>
  <option value="split">تقسيم PDF</option>
  <option value="compress">ضغط PDF</option>
  <option value="pdf-to-word">PDF → Word</option>
  <option value="pdf-to-jpg">PDF → JPG</option>
  <option value="jpg-to-pdf">JPG → PDF</option>
  <option value="protect">حماية PDF</option>
  <option value="unlock">فك الحماية</option>
</select>

<input type="file" id="file" multiple>

<button onclick="preview()">👁 Preview</button>
<button onclick="run()">🚀 تنفيذ</button>

<div id="result"></div>

</div>

<script>

const API = "https://pdf-server-production-82f5.up.railway.app";

async function preview() {
  try {
    const file = document.getElementById("file").files[0];
    if (!file) return alert("اختار ملف");

    const fd = new FormData();
    fd.append("file", file);

    document.getElementById("result").innerText = "⏳ جاري المعاينة...";

    const res = await fetch(API + "/preview", {
      method: "POST",
      body: fd
    });

    const data = await res.json();

    if (data.url) {
      document.getElementById("result").innerHTML =
        `<img src="${API + data.url}" width="100%">`;
    } else {
      document.getElementById("result").innerText = "❌ فشل Preview";
    }

  } catch (e) {
    alert("❌ السيرفر مش بيرد");
    console.log(e);
  }
}

async function run() {
  try {
    const tool = document.getElementById("tool").value;
    const files = document.getElementById("file").files;

    if (files.length === 0) return alert("اختار ملف");

    const fd = new FormData();

    if (tool === "merge") {
      for (let f of files) fd.append("files", f);
    } else {
      fd.append("file", files[0]);
    }

    document.getElementById("result").innerText = "⏳ جاري التنفيذ...";

    const res = await fetch(API + "/" + tool, {
      method: "POST",
      body: fd
    });

    const data = await res.json();

    if (data.url) {
      document.getElementById("result").innerHTML =
        `<a href="${API + data.url}" target="_blank">📥 تحميل الملف</a>`;
    } else {
      document.getElementById("result").innerText = "❌ Error في السيرفر";
    }

  } catch (e) {
    alert("❌ السيرفر مش بيرد");
    console.log(e);
  }
}

</script>

</body>
</html>
