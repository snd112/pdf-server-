<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 PDFORGE ULTRA</title>

<style>
body {
  background:#0b1220;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1 {
  margin-top:20px;
}

button {
  width:90%;
  margin:10px;
  padding:15px;
  border:none;
  border-radius:15px;
  background:linear-gradient(45deg,#6a5cff,#8f44fd);
  color:white;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}
</style>
</head>

<body>

<h1>🔥 PDFORGE ULTRA</h1>

<input type="file" id="files" multiple>

<br><br>

<button onclick="run('merge')">دمج PDF</button>
<button onclick="run('split')">تقسيم PDF</button>
<button onclick="run('compress')">ضغط PDF</button>
<button onclick="run('pdfjpg')">PDF → JPG</button>
<button onclick="run('imagepdf')">JPG → PDF</button>
<button onclick="run('officepdf')">Word/PPT/Excel → PDF</button>
<button onclick="run('pdfoffice')">PDF → Word</button>
<button onclick="run('pdfpowerpoint')">PDF → PPT</button>
<button onclick="run('pdfexcel')">PDF → Excel</button>
<button onclick="run('protect')">حماية PDF</button>
<button onclick="run('unlock')">فك حماية PDF</button>

<script>
async function run(tool){
  const input = document.getElementById("files");

  if(!input.files.length){
    alert("اختار ملف");
    return;
  }

  const formData = new FormData();

  // ✅ اسم الحقل لازم يكون "file"
  for(let i=0;i<input.files.length;i++){
    formData.append("file",input.files[i]);
  }

  formData.append("tool",tool);

  try{
    const res = await fetch("/api/process",{
      method:"POST",
      body:formData
    });

    if(!res.ok) throw new Error();

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "result";
    a.click();

  }catch{
    alert("❌ حصل خطأ");
  }
}
</script>

</body>
</html>
