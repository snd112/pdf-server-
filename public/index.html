<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PDFORGE ULTRA</title>
<style>
body { background:#0b0f1a;color:white;font-family:sans-serif;text-align:center }
button { width:90%;padding:12px;margin:5px;border-radius:8px;border:none;background:#6c5ce7;color:white }
</style>
</head>
<body>

<h1>🔥 PDFORGE ULTRA</h1>

<input type="file" id="file" multiple><br>

<button onclick="run('/merge',true)">دمج PDF</button>
<button onclick="run('/split')">تقسيم PDF</button>
<button onclick="run('/compress')">ضغط PDF</button>

<button onclick="run('/pdf-to-word')">PDF → Word</button>
<button onclick="run('/word-to-pdf')">Word → PDF</button>

<button onclick="run('/pdf-to-ppt')">PDF → PPT</button>
<button onclick="run('/ppt-to-pdf')">PPT → PDF</button>

<button onclick="run('/pdf-to-excel')">PDF → Excel</button>
<button onclick="run('/excel-to-pdf')">Excel → PDF</button>

<button onclick="run('/pdf-to-jpg')">PDF → JPG</button>
<button onclick="run('/jpg-to-pdf',true)">JPG → PDF</button>

<button onclick="run('/protect')">حماية PDF</button>
<button onclick="run('/unlock')">فك الحماية</button>

<button onclick="run('/ocr')">OCR</button>

<p id="status"></p>

<script>
function files(){return document.getElementById("file").files}

async function run(url,multi=false){
  const fd=new FormData()
  if(multi){
    for(let f of files()) fd.append("files",f)
  }else{
    fd.append("file",files()[0])
  }

  status.innerText="⏳ جاري التنفيذ..."

  const res=await fetch(url,{method:"POST",body:fd})
  const data=await res.json()

  if(data.url){
    status.innerHTML=`<a href="${data.url}" target="_blank">⬇️ تحميل</a>`
  }else{
    status.innerText="❌ فشل"
  }
}
</script>

</body>
</html>
