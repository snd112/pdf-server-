<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 PDFORGE PRO</title>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif;text-align:center}
h1{margin:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
button{padding:15px;border:none;border-radius:12px;background:#7c3aed;color:#fff;font-size:14px}
input{margin:15px}
</style>

</head>
<body>

<h1>🔥 PDFORGE PRO</h1>

<input type="file" id="file" multiple>

<div class="grid">

<button onclick="run('/merge')">دمج PDF</button>
<button onclick="run('/split')">تقسيم PDF</button>
<button onclick="run('/compress')">ضغط PDF</button>

<button onclick="run('/pdf-to-word')">PDF → Word</button>
<button onclick="run('/pdf-to-excel')">PDF → Excel</button>
<button onclick="run('/pdf-to-ppt')">PDF → PPT</button>

<button onclick="run('/word-to-pdf')">Word → PDF</button>

<button onclick="run('/pdf-to-jpg')">PDF → JPG</button>
<button onclick="run('/jpg-to-pdf')">JPG → PDF</button>

<button onclick="run('/ocr')">OCR</button>

<button onclick="run('/protect')">حماية</button>
<button onclick="run('/unlock')">فك الحماية</button>

<button onclick="run('/rotate')">تدوير</button>
<button onclick="run('/watermark')">Watermark</button>

<button onclick="run('/html-to-pdf')">HTML → PDF</button>

</div>

<script>
async function run(url){
  const files = document.getElementById("file").files;

  if(files.length === 0){
    alert("❗ اختار ملف");
    return;
  }

  const fd = new FormData();

  for (let f of files) fd.append("files", f);
  fd.append("file", files[0]);

  const res = await fetch(url,{method:"POST",body:fd});
  const data = await res.json();

  if(data.url){
    window.open(data.url);
  }else{
    alert("❌ فشل العملية");
  }
}
</script>

</body>
</html>
