<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDFORGE ULTRA</title>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: #fff;
  text-align: center;
  padding: 20px;
}

.container {
  background: #111a2e;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

select, input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

#result a {
  color: #4ade80;
}
</style>

</head>
<body>

<h1>🔥 PDFORGE ULTRA</h1>

<div class="container">

<select id="tool">
  <option value="merge">دمج PDF</option>
  <option value="preview">معاينة PDF</option>
</select>

<input type="file" id="fileInput" multiple>

<button onclick="preview()">👁 Preview</button>
<button onclick="runTool()">🚀 تنفيذ</button>

<div id="status"></div>
<div id="result"></div>

</div>

<script>

let token = "";

// 🔐 تسجيل دخول تلقائي
async function login() {
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: "test@test.com",
      password: "123456"
    })
  });

  const data = await res.json();

  if (!data.token) {
    await fetch("/register", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        email: "test@test.com",
        password: "123456"
      })
    });
    return login();
  }

  token = data.token;
}

login();


// 👁 Preview
async function preview() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("اختار ملف");

  const form = new FormData();
  form.append("file", file);

  document.getElementById("status").innerText = "⏳ جاري المعاينة...";

  const res = await fetch("/preview", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  if (data.error) {
    alert(data.message);
    return;
  }

  document.getElementById("result").innerHTML =
    `<img src="${data.url}" width="100%">`;
}


// 🚀 تشغيل الأدوات
async function runTool() {
  const tool = document.getElementById("tool").value;
  const files = document.getElementById("fileInput").files;

  if (files.length === 0) return alert("اختار ملفات");

  const form = new FormData();

  for (let f of files) {
    form.append("files", f);
  }

  document.getElementById("status").innerText = "⏳ جاري التنفيذ...";

  const res = await fetch(`/${tool}`, {
    method: "POST",
    headers: {
      "Authorization": token
    },
    body: form
  });

  const data = await res.json();

  if (data.error) {
    alert(data.message);
    return;
  }

  if (tool === "merge") {
    checkStatus(data.jobId);
  }
}


// ⏳ متابعة الحالة
async function checkStatus(id) {
  const interval = setInterval(async () => {

    const res = await fetch(`/status/${id}`);
    const data = await res.json();

    if (data.status === "done") {
      clearInterval(interval);

      document.getElementById("status").innerText = "✅ تم!";
      document.getElementById("result").innerHTML =
        `<a href="${data.url}" target="_blank">📥 تحميل الملف</a>`;
    }

    if (data.status === "error") {
      clearInterval(interval);
      alert("❌ حصل خطأ");
    }

  }, 2000);
}

</script>

</body>
</html>
