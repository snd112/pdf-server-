<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PDFORGE ULTRA</title>
<style>
body {
  background: #0b0f1a;
  color: white;
  font-family: sans-serif;
  text-align: center;
}
.container {
  max-width: 500px;
  margin: auto;
}
button {
  width: 100%;
  padding: 15px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #6c5ce7;
  color: white;
  font-size: 16px;
}
input {
  margin: 10px;
}
</style>
</head>
<body>

<div class="container">
<h1>🔥 PDFORGE ULTRA</h1>

<input type="file" id="file" multiple>

<button onclick="merge()">دمج PDF</button>
<button onclick="split()">تقسيم PDF</button>
<button onclick="compress()">ضغط PDF</button>
<button onclick="pdfToJpg()">PDF → JPG</button>
<button onclick="jpgToPdf()">JPG → PDF</button>

<p id="status"></p>
</div>

<script>
const API = "";

async function send(url, files) {
  const fd = new FormData();
  files.forEach(f => fd.append("files", f));

  document.getElementById("status").innerText = "⏳ جاري التنفيذ...";

  const res = await fetch(url, { method: "POST", body: fd });
  const data = await res.json();

  if (data.url) {
    document.getElementById("status").innerHTML =
      `<a href="${data.url}" target="_blank">⬇️ تحميل</a>`;
  } else {
    document.getElementById("status").innerText = "❌ فشل";
  }
}

function getFiles() {
  return Array.from(document.getElementById("file").files);
}

function merge() {
  send("/merge", getFiles());
}

function jpgToPdf() {
  send("/jpg-to-pdf", getFiles());
}

function split() {
  const fd = new FormData();
  fd.append("file", getFiles()[0]);
  fetch("/split", { method: "POST", body: fd });
}

function compress() {
  const fd = new FormData();
  fd.append("file", getFiles()[0]);
  fetch("/compress", { method: "POST", body: fd });
}

function pdfToJpg() {
  const fd = new FormData();
  fd.append("file", getFiles()[0]);
  fetch("/pdf-to-jpg", { method: "POST", body: fd });
}
</script>

</body>
</html>
