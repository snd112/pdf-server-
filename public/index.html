<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🔥 PDFORGE ULTRA</title>
<style>
body { background:#0b0f1a; color:#fff; font-family:sans-serif; text-align:center }
button { width:90%; padding:15px; margin:8px; border:none; border-radius:10px; background:#6c5ce7; color:#fff; font-size:16px }
input { margin:10px }
</style>
</head>
<body>

<h1>🔥 PDFORGE ULTRA</h1>

<input type="file" id="file" multiple>

<button onclick="run('merge')">دمج PDF</button>
<button onclick="run('compress')">ضغط PDF</button>
<button onclick="run('pdf-to-word')">PDF → Word</button>
<button onclick="run('word-to-pdf')">Word → PDF</button>
<button onclick="run('pdf-to-ppt')">PDF → PPT</button>
<button onclick="run('ppt-to-pdf')">PPT → PDF</button>
<button onclick="run('pdf-to-excel')">PDF → Excel</button>
<button onclick="run('excel-to-pdf')">Excel → PDF</button>
<button onclick="run('pdf-to-jpg')">PDF → JPG</button>
<button onclick="run('jpg-to-pdf')">JPG → PDF</button>
<button onclick="run('protect')">حماية PDF</button>
<button onclick="run('unlock')">فك حماية PDF</button>
<button onclick="run('ocr')">OCR</button>

<script>
async function run(tool) {
  const fileInput = document.getElementById("file");
  const files = fileInput.files;

  if (!files.length) return alert("اختار ملف");

  const form = new FormData();

  if (tool === "merge") {
    for (let f of files) form.append("files", f);
  } else {
    form.append("file", files[0]);
  }

  const res = await fetch("/" + tool, {
    method: "POST",
    body: form
  });

  const data = await res.json();

  if (data.url) {
    window.open(data.url);
  } else {
    alert("فشل");
  }
}
</script>

</body>
</html>
